<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로나이 SEO 생성기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0f0f10;
    --surface: #18181b;
    --surface2: #1f1f23;
    --border: #2a2a30;
    --border2: #36363f;
    --accent: #c6a96e;
    --accent2: #e8c98a;
    --text: #f0ede8;
    --text2: #a09890;
    --text3: #605850;
    --danger: #e05252;
    --success: #4ecb71;
    --radius: 10px;
    --radius-sm: 6px;
    --font: 'Pretendard', -apple-system, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ─── LAYOUT ─── */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.3px;
  }

  .logo-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .app-body {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: calc(100vh - 57px);
  }

  /* ─── LEFT PANEL ─── */
  .left-panel {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    height: calc(100vh - 57px);
    position: sticky;
    top: 57px;
  }

  .panel-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
  }

  /* API KEY */
  .api-row {
    display: flex;
    gap: 8px;
  }

  .api-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    margin-top: 8px;
    color: var(--text2);
  }

  .api-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
  }

  .api-dot.ok { background: var(--success); }

  /* PRODUCT INFO */
  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 10px 12px;
    resize: vertical;
    transition: border-color 0.15s;
    line-height: 1.5;
  }

  textarea:focus { outline: none; border-color: var(--border2); }
  textarea::placeholder { color: var(--text3); }

  /* DROP ZONE */
  .drop-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface2);
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(198,169,110,0.05);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    font-size: 28px;
    margin-bottom: 8px;
  }

  .drop-label {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 4px;
  }

  .drop-hint {
    font-size: 11px;
    color: var(--text3);
  }

  /* PREVIEWS */
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 12px;
  }

  .preview-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: var(--radius-sm);
    overflow: hidden;
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .preview-item .remove-btn {
    position: absolute;
    top: 3px;
    right: 3px;
    width: 18px;
    height: 18px;
    background: rgba(0,0,0,0.7);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .preview-item:hover .remove-btn { opacity: 1; }

  .preview-item .warn-badge {
    position: absolute;
    bottom: 3px;
    left: 3px;
    background: #f59e0b;
    color: #000;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
  }

  .pdf-thumb {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    gap: 4px;
    color: var(--text2);
  }

  .pdf-thumb span {
    font-size: 10px;
    max-width: 90%;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    font-size: 13px;
  }

  .btn-primary {
    background: var(--accent);
    color: #1a1209;
    padding: 10px 20px;
    font-weight: 700;
    font-size: 14px;
  }

  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 7px 12px;
    font-size: 12px;
  }

  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }

  .btn-icon {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 7px 10px;
    font-size: 14px;
  }

  .btn-icon:hover { border-color: var(--border2); color: var(--text); }

  .btn-generate {
    width: 100%;
    padding: 13px;
    font-size: 14px;
    border-radius: var(--radius);
  }

  input[type="text"], input[type="password"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 9px 12px;
    width: 100%;
    transition: border-color 0.15s;
  }

  input:focus { outline: none; border-color: var(--border2); }
  input::placeholder { color: var(--text3); }

  /* ─── RIGHT PANEL ─── */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .tabs-bar {
    display: flex;
    gap: 2px;
    padding: 16px 20px 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .tab-btn {
    background: transparent;
    border: none;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    transition: all 0.15s;
    position: relative;
    bottom: -1px;
  }

  .tab-btn.active {
    color: var(--accent);
    background: var(--bg);
    border: 1px solid var(--border);
    border-bottom-color: var(--bg);
  }

  .tab-btn:not(.active):hover { color: var(--text); }

  .tab-content {
    display: none;
    padding: 24px;
    overflow-y: auto;
    flex: 1;
  }

  .tab-content.active { display: block; }

  /* RESULT SECTIONS */
  .result-block {
    margin-bottom: 24px;
  }

  .result-block-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-text {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 60px;
    position: relative;
  }

  .result-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    justify-content: flex-end;
  }

  /* TAGS */
  .tags-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    min-height: 48px;
  }

  .tag-chip {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
  }

  .tag-chip:hover { border-color: var(--accent); color: var(--accent); }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 300px;
    text-align: center;
    gap: 12px;
    padding: 40px;
    color: var(--text3);
  }

  .empty-icon { font-size: 40px; opacity: 0.5; }
  .empty-title { font-size: 15px; font-weight: 600; color: var(--text2); }
  .empty-sub { font-size: 13px; }

  /* LOADING */
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    gap: 20px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-msg {
    font-size: 13px;
    color: var(--text2);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

  /* HISTORY */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
  }

  .history-item:hover { border-color: var(--border2); }
  .history-item.active-history { border-color: var(--accent); }

  .history-thumb {
    width: 36px;
    height: 36px;
    border-radius: 5px;
    object-fit: cover;
    background: var(--surface);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .history-info { flex: 1; overflow: hidden; }
  .history-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-date { font-size: 11px; color: var(--text3); }

  .history-del {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 14px;
    padding: 4px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .history-del:hover { color: var(--danger); }

  .history-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    z-index: 9999;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    white-space: nowrap;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error { border-color: var(--danger); color: var(--danger); }

  /* MOBILE */
  @media (max-width: 768px) {
    .app-body {
      grid-template-columns: 1fr;
    }

    .left-panel {
      height: auto;
      position: static;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }

    .mobile-tab-bar {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .mobile-tab {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      transition: color 0.15s;
      border-bottom: 2px solid transparent;
    }

    .mobile-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .mobile-view {
      display: none;
    }

    .mobile-view.active {
      display: block;
    }
  }

  @media (min-width: 769px) {
    .mobile-tab-bar { display: none; }
    .mobile-view { display: block !important; }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* CHAR COUNT */
  .char-info {
    font-size: 11px;
    color: var(--text3);
    text-align: right;
    margin-top: 4px;
  }
  .char-info.warn { color: #f59e0b; }
  .char-info.ok { color: var(--success); }

  /* HISTORY PANEL */
  .history-panel {
    padding: 20px;
    overflow-y: auto;
    height: 100%;
    flex: 1;
  }

  /* DIVIDER */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* METADATA BAR */
  .meta-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 12px;
    color: var(--text2);
  }

  .meta-item {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .meta-key { color: var(--text3); }
  .meta-val { color: var(--text); font-weight: 500; }

  /* PROGRESS BAR */
  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    width: 0%;
    transition: width 0.3s;
  }

  .char-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 4px;
  }

  .char-badge {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
  }

  .char-badge.ok { background: rgba(78,203,113,0.15); color: var(--success); }
  .char-badge.warn { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .char-badge.over { background: rgba(224,82,82,0.15); color: var(--danger); }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">
    <div class="logo-dot"></div>
    로나이 SEO 생성기
  </div>
  <div class="header-actions">
    <button class="btn btn-icon" onclick="exportHistory()" title="히스토리 내보내기">⬇</button>
    <label class="btn btn-icon" title="히스토리 가져오기" style="cursor:pointer">
      ⬆<input type="file" accept=".json" onchange="importHistory(event)" style="display:none">
    </label>
  </div>
</header>

<!-- MOBILE TAB BAR -->
<div class="mobile-tab-bar">
  <button class="mobile-tab active" onclick="switchMobile('input')">입력</button>
  <button class="mobile-tab" onclick="switchMobile('result')">결과</button>
  <button class="mobile-tab" onclick="switchMobile('history')">히스토리</button>
</div>

<div class="app-body">

  <!-- ════ LEFT PANEL ════ -->
  <aside class="left-panel mobile-view" id="mobileInput">

    <!-- API KEY -->
    <div class="panel-section">
      <div class="section-label">API 키</div>
      <div class="api-row">
        <input type="password" id="apiKey" placeholder="sk-ant-..." oninput="checkApiKey()">
        <button class="btn btn-ghost" onclick="toggleApiVis()">👁</button>
      </div>
      <div class="api-status">
        <div class="api-dot" id="apiDot"></div>
        <span id="apiStatus">키를 입력하세요</span>
      </div>
    </div>

    <!-- PRODUCT INFO -->
    <div class="panel-section">
      <div class="section-label">제품 정보 (선택)</div>
      <textarea id="productInfo" rows="4" placeholder="제품명, 브랜드, 주요 성분, 효능, 특징 등&#10;이미지만 있어도 생성 가능합니다"></textarea>
    </div>

    <!-- FILE UPLOAD -->
    <div class="panel-section">
      <div class="section-label">이미지 / PDF 업로드</div>
      <div class="drop-zone" id="dropZone"
           ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFiles(event)">
        <input type="file" accept="image/*,.pdf,image/heic" multiple onchange="handleFiles(event)">
        <div class="drop-icon">📎</div>
        <div class="drop-label">클릭하거나 파일을 여기에 드롭</div>
        <div class="drop-hint">JPG · PNG · WEBP · HEIC · PDF · 여러 장 가능</div>
      </div>
      <div class="preview-grid" id="previewGrid"></div>
    </div>

    <!-- GENERATE -->
    <div class="panel-section">
      <button class="btn btn-primary btn-generate" id="generateBtn" onclick="generate()" disabled>
        ✦ SEO 콘텐츠 생성
      </button>
    </div>

    <!-- HISTORY -->
    <div class="history-panel" id="historyDesktop">
      <div class="history-bar">
        <div class="section-label" style="margin:0">히스토리</div>
        <button class="btn btn-ghost" style="font-size:11px; padding:4px 8px" onclick="clearAllHistory()">전체 삭제</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

  </aside>

  <!-- ════ RIGHT PANEL ════ -->
  <main class="right-panel">

    <!-- TABS -->
    <div class="tabs-bar">
      <button class="tab-btn active" onclick="switchTab(0, this)">네이버 스마트스토어</button>
      <button class="tab-btn" onclick="switchTab(1, this)">아임웹 상세페이지</button>
      <button class="tab-btn" onclick="switchTab(2, this)">아임웹 검색설정</button>
    </div>

    <div class="mobile-view" id="mobileResult" style="flex:1;overflow:hidden;display:flex;flex-direction:column">

      <!-- TAB 0: 스마트스토어 -->
      <div class="tab-content active" id="tab0">
        <div id="tab0-empty" class="empty-state">
          <div class="empty-icon">🌿</div>
          <div class="empty-title">생성 결과가 여기에 표시됩니다</div>
          <div class="empty-sub">이미지나 PDF를 업로드하고<br>SEO 콘텐츠 생성 버튼을 누르세요</div>
        </div>
        <div id="tab0-content" style="display:none">
          <div id="smartstoreResult"></div>
        </div>
      </div>

      <!-- TAB 1: 아임웹 상세 -->
      <div class="tab-content" id="tab1">
        <div id="tab1-empty" class="empty-state">
          <div class="empty-icon">📄</div>
          <div class="empty-title">생성 결과가 여기에 표시됩니다</div>
          <div class="empty-sub">스마트스토어 탭 생성 후 함께 표시됩니다</div>
        </div>
        <div id="tab1-content" style="display:none">
          <div id="imwebDetailResult"></div>
        </div>
      </div>

      <!-- TAB 2: 아임웹 검색설정 -->
      <div class="tab-content" id="tab2">
        <div id="tab2-empty" class="empty-state">
          <div class="empty-icon">🔍</div>
          <div class="empty-title">생성 결과가 여기에 표시됩니다</div>
          <div class="empty-sub">스마트스토어 탭 생성 후 함께 표시됩니다</div>
        </div>
        <div id="tab2-content" style="display:none">
          <div id="imwebSearchResult"></div>
        </div>
      </div>

    </div><!-- /mobileResult -->

    <!-- MOBILE HISTORY -->
    <div class="mobile-view" id="mobileHistory" style="padding:20px;overflow-y:auto;display:none">
      <div class="history-bar">
        <div class="section-label" style="margin:0">히스토리</div>
        <button class="btn btn-ghost" style="font-size:11px;padding:4px 8px" onclick="clearAllHistory()">전체 삭제</button>
      </div>
      <div class="history-list" id="historyListMobile"></div>
    </div>

  </main>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let uploadedFiles = []; // {file, base64, type:'image'|'pdf', warn:bool}
let currentTab = 0;
let history = JSON.parse(localStorage.getItem('ronai_seo_history') || '[]');
let activeHistoryId = null;
let isLoading = false;

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('ronai_seo_apikey');
  if (saved) {
    document.getElementById('apiKey').value = saved;
    checkApiKey();
  }
  renderHistory();
  updateGenerateBtn();
});

// ══════════════════════════════════════════
//  API KEY
// ══════════════════════════════════════════
function checkApiKey() {
  const key = document.getElementById('apiKey').value.trim();
  const dot = document.getElementById('apiDot');
  const status = document.getElementById('apiStatus');

  if (key.startsWith('sk-ant-') && key.length > 20) {
    dot.className = 'api-dot ok';
    status.textContent = '키 형식 확인됨';
    localStorage.setItem('ronai_seo_apikey', key);
  } else if (key.length > 0) {
    dot.className = 'api-dot';
    dot.style.background = '#f59e0b';
    status.textContent = '형식을 확인하세요 (sk-ant-...)';
  } else {
    dot.className = 'api-dot';
    dot.style.background = '';
    status.textContent = '키를 입력하세요';
  }
  updateGenerateBtn();
}

function toggleApiVis() {
  const el = document.getElementById('apiKey');
  el.type = el.type === 'password' ? 'text' : 'password';
}

// ══════════════════════════════════════════
//  FILE UPLOAD
// ══════════════════════════════════════════
function dragOver(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.add('drag-over');
}

function dragLeave(e) {
  document.getElementById('dropZone').classList.remove('drag-over');
}

function dropFiles(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  handleFileList(e.dataTransfer.files);
}

function handleFiles(e) {
  handleFileList(e.target.files);
  e.target.value = '';
}

async function handleFileList(files) {
  for (const file of files) {
    if (uploadedFiles.length >= 8) {
      toast('최대 8개까지 업로드 가능합니다', 'error');
      break;
    }
    await processFile(file);
  }
  renderPreviews();
  updateGenerateBtn();
}

async function processFile(file) {
  const isPdf = file.type === 'application/pdf';
  const isImg = file.type.startsWith('image/') || file.name.toLowerCase().endsWith('.heic');

  if (!isPdf && !isImg) {
    toast(`지원하지 않는 파일: ${file.name}`, 'error');
    return;
  }

  const base64 = await new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result.split(',')[1]);
    reader.onerror = () => rej();
    reader.readAsDataURL(file);
  });

  let warn = false;
  let thumbnail = null;

  if (isImg) {
    const result = await resizeImage(base64, file.type, 2000);
    const { b64, width, height, mimeType } = result;

    if (width < 500 || height < 500) warn = true;

    uploadedFiles.push({ file, base64: b64, type: 'image', warn, mimeType: mimeType || file.type, width, height });
  } else {
    uploadedFiles.push({ file, base64, type: 'pdf', warn: false, mimeType: 'application/pdf' });
  }
}

function resizeImage(base64, mimeType, maxPx) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      const origW = width, origH = height;

      if (width > maxPx || height > maxPx) {
        const ratio = Math.min(maxPx / width, maxPx / height);
        width = Math.round(width * ratio);
        height = Math.round(height * ratio);
      }

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);

      // Use JPEG for better compression, PNG for transparency
      const outMime = mimeType === 'image/png' ? 'image/png' : 'image/jpeg';
      const dataUrl = canvas.toDataURL(outMime, 0.88);
      resolve({
        b64: dataUrl.split(',')[1],
        width: origW,
        height: origH,
        mimeType: outMime
      });
    };
    img.src = `data:${mimeType};base64,${base64}`;
  });
}

function renderPreviews() {
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = '';

  uploadedFiles.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'preview-item';

    if (f.type === 'image') {
      const img = document.createElement('img');
      img.src = `data:${f.mimeType};base64,${f.base64}`;
      img.alt = f.file.name;
      item.appendChild(img);
    } else {
      const thumb = document.createElement('div');
      thumb.className = 'pdf-thumb';
      thumb.innerHTML = `📄<span>${f.file.name}</span>`;
      item.appendChild(thumb);
    }

    if (f.warn) {
      const badge = document.createElement('div');
      badge.className = 'warn-badge';
      badge.textContent = '저해상도';
      item.appendChild(badge);
    }

    const btn = document.createElement('button');
    btn.className = 'remove-btn';
    btn.innerHTML = '✕';
    btn.onclick = () => removeFile(i);
    item.appendChild(btn);

    grid.appendChild(item);
  });
}

function removeFile(i) {
  uploadedFiles.splice(i, 1);
  renderPreviews();
  updateGenerateBtn();
}

function updateGenerateBtn() {
  const key = document.getElementById('apiKey').value.trim();
  const hasFiles = uploadedFiles.length > 0;
  const hasKey = key.startsWith('sk-ant-') && key.length > 20;
  const hasInfo = document.getElementById('productInfo').value.trim().length > 0;

  document.getElementById('generateBtn').disabled = !hasKey || (!hasFiles && !hasInfo) || isLoading;
}

document.getElementById('productInfo').addEventListener('input', updateGenerateBtn);

// ══════════════════════════════════════════
//  GENERATE
// ══════════════════════════════════════════
async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const productInfo = document.getElementById('productInfo').value.trim();

  if (!apiKey) return toast('API 키를 입력하세요', 'error');
  if (!uploadedFiles.length && !productInfo) return toast('이미지나 제품 정보를 입력하세요', 'error');

  isLoading = true;
  updateGenerateBtn();

  // Build messages
  const content = [];

  // System context text first
  let contextText = `당신은 한국 화장품 쇼핑몰 SEO 전문가입니다. 로나이(ronai.co.kr) 스킨케어 브랜드의 상품 SEO 콘텐츠를 생성합니다.

반드시 지켜야 할 규칙:
- 공정위 및 화장품법 준수: 효능 효과 표현 시 "도움을 줄 수 있는", "가능한", "경험하실 수 있는" 등 완화 표현 사용
- 의약품적 표현 금지 (치료, 재생, 회복 등 불가)
- 브랜드/판매자명을 아임웹 태그에 포함 금지
- 자연스럽고 구어적인 한국어 사용 (AI 감지 회피)
- 실제 소비자가 검색할 법한 키워드 중심

${productInfo ? `\n제품 정보:\n${productInfo}` : ''}

아래 형식의 JSON으로만 응답하세요. 다른 텍스트 없이 JSON만 출력하세요:
{
  "smartstore": {
    "product_name": "상품명 (최대 100자, SEO 최적화)",
    "detail_content": "상세설명 (800-1200자, 공정위 준수, 구어체)",
    "search_tags": ["태그1", "태그2", "...", "최대 20개"]
  },
  "imweb_detail": {
    "page_title": "페이지 제목 (50자 이내)",
    "meta_description": "메타 설명 (100-160자)",
    "detail_content": "상세페이지 HTML 콘텐츠 설명 (600-1000자, 세련된 문체)"
  },
  "imweb_search": {
    "page_title": "검색설정 페이지 제목 (50자 이내)",
    "search_description": "검색 설명 (100-160자)",
    "search_tags": ["태그1", "태그2", "...", "최대 10개, 브랜드명 제외"]
  }
}`;

  content.push({ type: 'text', text: contextText });

  // Add files
  for (const f of uploadedFiles) {
    if (f.type === 'image') {
      content.push({
        type: 'image',
        source: {
          type: 'base64',
          media_type: f.mimeType,
          data: f.base64
        }
      });
    } else {
      content.push({
        type: 'document',
        source: {
          type: 'base64',
          media_type: 'application/pdf',
          data: f.base64
        }
      });
    }
  }

  showLoading();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4000,
        messages: [{ role: 'user', content }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const raw = data.content[0]?.text || '';

    // Parse JSON
    let parsed;
    try {
      const clean = raw.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch (e) {
      throw new Error('응답 파싱 실패. 다시 시도해보세요.');
    }

    renderResults(parsed);
    saveHistory(parsed);
    toast('✦ SEO 콘텐츠 생성 완료', 'success');

    // Switch to result on mobile
    if (window.innerWidth <= 768) switchMobile('result');

  } catch (err) {
    console.error(err);
    toast(err.message || '오류가 발생했습니다', 'error');
    hideLoading();
  }

  isLoading = false;
  updateGenerateBtn();
}

// ══════════════════════════════════════════
//  RENDER RESULTS
// ══════════════════════════════════════════
function renderResults(data) {
  hideLoading();

  // TAB 0: 스마트스토어
  renderSmartstore(data.smartstore);
  // TAB 1: 아임웹 상세
  renderImwebDetail(data.imweb_detail);
  // TAB 2: 아임웹 검색설정
  renderImwebSearch(data.imweb_search);

  ['tab0','tab1','tab2'].forEach(id => {
    document.getElementById(`${id}-empty`).style.display = 'none';
    document.getElementById(`${id}-content`).style.display = 'block';
  });
}

function renderSmartstore(d) {
  if (!d) return;
  const el = document.getElementById('smartstoreResult');
  el.innerHTML = '';

  // Product name
  appendBlock(el, '상품명', d.product_name, {
    maxChars: 100,
    charLabel: '자'
  });

  // Detail content
  appendBlock(el, '상세 설명', d.detail_content, {
    isTextarea: true,
    maxChars: 1200,
    charLabel: '자'
  });

  // Search tags
  appendTagBlock(el, '검색 태그 (클릭하면 복사)', d.search_tags);
}

function renderImwebDetail(d) {
  if (!d) return;
  const el = document.getElementById('imwebDetailResult');
  el.innerHTML = '';

  appendBlock(el, '페이지 제목', d.page_title, {
    maxChars: 50,
    charLabel: '자'
  });

  appendBlock(el, '메타 설명', d.meta_description, {
    maxChars: 160,
    charLabel: '자'
  });

  appendBlock(el, '상세 설명', d.detail_content, {
    isTextarea: true,
    maxChars: 1000,
    charLabel: '자'
  });
}

function renderImwebSearch(d) {
  if (!d) return;
  const el = document.getElementById('imwebSearchResult');
  el.innerHTML = '';

  appendBlock(el, '페이지 제목', d.page_title, {
    maxChars: 50,
    charLabel: '자'
  });

  appendBlock(el, '검색 설명', d.search_description, {
    maxChars: 160,
    charLabel: '자'
  });

  appendTagBlock(el, '검색 태그 (브랜드명 제외, 클릭하면 복사)', d.search_tags);
}

function appendBlock(container, label, value, opts = {}) {
  const block = document.createElement('div');
  block.className = 'result-block';

  const lbl = document.createElement('div');
  lbl.className = 'result-block-label';
  lbl.textContent = label;
  block.appendChild(lbl);

  const text = document.createElement(opts.isTextarea ? 'textarea' : 'div');
  text.className = 'result-text';
  if (opts.isTextarea) {
    text.value = value || '';
    text.rows = 8;
    text.style.resize = 'vertical';
    text.addEventListener('input', () => updateCharInfo(charInfo, bar, text.value, opts.maxChars));
  } else {
    text.textContent = value || '';
  }
  block.appendChild(text);

  // Char count
  if (opts.maxChars) {
    const charRow = document.createElement('div');
    charRow.className = 'char-row';

    const bar = document.createElement('div');
    bar.className = 'progress-bar';
    bar.style.flex = '1';
    bar.style.marginRight = '8px';
    const fill = document.createElement('div');
    fill.className = 'progress-fill';
    bar.appendChild(fill);
    charRow.appendChild(bar);

    const badge = document.createElement('div');
    badge.className = 'char-badge';
    charRow.appendChild(badge);

    block.appendChild(charRow);
    const strVal = opts.isTextarea ? text.value : (value || '');
    updateCharInfo({ fill, badge }, null, strVal, opts.maxChars);

    if (opts.isTextarea) {
      text.addEventListener('input', () => updateCharInfo({ fill, badge }, null, text.value, opts.maxChars));
    }
  }

  // Actions
  const actions = document.createElement('div');
  actions.className = 'result-actions';

  const copyBtn = document.createElement('button');
  copyBtn.className = 'btn btn-ghost';
  copyBtn.textContent = '복사';
  copyBtn.onclick = () => {
    const val = opts.isTextarea ? text.value : text.textContent;
    copyToClipboard(val);
  };
  actions.appendChild(copyBtn);

  block.appendChild(actions);
  container.appendChild(block);
}

function updateCharInfo(refs, _unused, str, max) {
  const len = str.length;
  const pct = Math.min((len / max) * 100, 100);

  refs.fill.style.width = pct + '%';

  if (len > max) {
    refs.fill.style.background = 'var(--danger)';
    refs.badge.className = 'char-badge over';
    refs.badge.textContent = `${len}/${max} 초과`;
  } else if (len >= max * 0.8) {
    refs.fill.style.background = 'var(--success)';
    refs.badge.className = 'char-badge ok';
    refs.badge.textContent = `${len}/${max}`;
  } else {
    refs.fill.style.background = 'var(--accent)';
    refs.badge.className = 'char-badge warn';
    refs.badge.textContent = `${len}/${max}`;
  }
}

function appendTagBlock(container, label, tags) {
  const block = document.createElement('div');
  block.className = 'result-block';

  const lbl = document.createElement('div');
  lbl.className = 'result-block-label';
  lbl.textContent = label;
  block.appendChild(lbl);

  const wrap = document.createElement('div');
  wrap.className = 'tags-wrap';

  (tags || []).forEach(tag => {
    const chip = document.createElement('div');
    chip.className = 'tag-chip';
    chip.textContent = tag;
    chip.onclick = () => {
      copyToClipboard(tag);
      chip.style.borderColor = 'var(--success)';
      chip.style.color = 'var(--success)';
      setTimeout(() => {
        chip.style.borderColor = '';
        chip.style.color = '';
      }, 800);
    };
    wrap.appendChild(chip);
  });

  block.appendChild(wrap);

  const actions = document.createElement('div');
  actions.className = 'result-actions';
  const copyAllBtn = document.createElement('button');
  copyAllBtn.className = 'btn btn-ghost';
  copyAllBtn.textContent = '전체 복사';
  copyAllBtn.onclick = () => copyToClipboard((tags || []).join(', '));
  actions.appendChild(copyAllBtn);
  block.appendChild(actions);

  container.appendChild(block);
}

// ══════════════════════════════════════════
//  LOADING
// ══════════════════════════════════════════
const LOADING_MSGS = [
  '이미지에서 성분과 특징을 읽는 중...',
  'SEO 키워드를 분석하는 중...',
  '공정위 표현으로 다듬는 중...',
  '네이버 검색 최적화 중...',
  '아임웹 콘텐츠를 구성하는 중...'
];

let loadingInterval;

function showLoading() {
  let msgIdx = 0;

  ['tab0','tab1','tab2'].forEach(id => {
    document.getElementById(`${id}-empty`).style.display = 'none';
    document.getElementById(`${id}-content`).style.display = 'none';

    const wrap = document.createElement('div');
    wrap.className = 'loading-wrap';
    wrap.id = `loading-${id}`;
    wrap.innerHTML = `<div class="spinner"></div><div class="loading-msg" id="msg-${id}">${LOADING_MSGS[0]}</div>`;

    const tab = document.getElementById(id);
    // Remove previous loading
    const prev = tab.querySelector('.loading-wrap');
    if (prev) prev.remove();
    tab.appendChild(wrap);
  });

  loadingInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % LOADING_MSGS.length;
    ['tab0','tab1','tab2'].forEach(id => {
      const el = document.getElementById(`msg-${id}`);
      if (el) el.textContent = LOADING_MSGS[msgIdx];
    });
  }, 1800);
}

function hideLoading() {
  clearInterval(loadingInterval);
  ['tab0','tab1','tab2'].forEach(id => {
    const wrap = document.getElementById(`loading-${id}`);
    if (wrap) wrap.remove();
  });
}

// ══════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════
function switchTab(idx, btn) {
  currentTab = idx;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

// ══════════════════════════════════════════
//  MOBILE SWITCH
// ══════════════════════════════════════════
function switchMobile(view) {
  document.querySelectorAll('.mobile-tab').forEach((t, i) => {
    const views = ['input','result','history'];
    t.classList.toggle('active', views[i] === view);
  });

  document.getElementById('mobileInput').style.display = view === 'input' ? 'flex' : 'none';
  document.getElementById('mobileInput').style.flexDirection = 'column';

  const resultPanel = document.getElementById('mobileResult');
  resultPanel.style.display = view === 'result' ? 'flex' : 'none';

  const histPanel = document.getElementById('mobileHistory');
  histPanel.style.display = view === 'history' ? 'block' : 'none';

  if (view !== 'input') {
    document.getElementById('mobileInput').style.display = 'none';
  }
  if (view !== 'result') {
    resultPanel.style.display = 'none';
  }
  if (view !== 'history') {
    histPanel.style.display = 'none';
  }

  if (view === 'history') renderHistory();
}

// ══════════════════════════════════════════
//  HISTORY
// ══════════════════════════════════════════
function saveHistory(data) {
  const productName = data.smartstore?.product_name || '이름 없음';
  const id = Date.now().toString();

  const entry = {
    id,
    date: new Date().toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }),
    name: productName,
    data
  };

  history.unshift(entry);
  if (history.length > 50) history = history.slice(0, 50);
  localStorage.setItem('ronai_seo_history', JSON.stringify(history));
  activeHistoryId = id;
  renderHistory();
}

function loadHistory(id) {
  const entry = history.find(h => h.id === id);
  if (!entry) return;
  activeHistoryId = id;
  renderResults(entry.data);
  renderHistory();
  if (window.innerWidth <= 768) switchMobile('result');
}

function deleteHistory(id, e) {
  e.stopPropagation();
  history = history.filter(h => h.id !== id);
  localStorage.setItem('ronai_seo_history', JSON.stringify(history));
  if (activeHistoryId === id) activeHistoryId = null;
  renderHistory();
}

function clearAllHistory() {
  if (!confirm('히스토리를 모두 삭제할까요?')) return;
  history = [];
  localStorage.removeItem('ronai_seo_history');
  activeHistoryId = null;
  renderHistory();
}

function renderHistory() {
  ['historyList', 'historyListMobile'].forEach(listId => {
    const list = document.getElementById(listId);
    if (!list) return;
    list.innerHTML = '';

    if (!history.length) {
      list.innerHTML = `<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">생성 히스토리가 없습니다</div>`;
      return;
    }

    history.forEach(entry => {
      const item = document.createElement('div');
      item.className = 'history-item' + (entry.id === activeHistoryId ? ' active-history' : '');
      item.onclick = () => loadHistory(entry.id);

      const thumb = document.createElement('div');
      thumb.className = 'history-thumb';
      thumb.textContent = '🌿';
      item.appendChild(thumb);

      const info = document.createElement('div');
      info.className = 'history-info';

      const name = document.createElement('div');
      name.className = 'history-name';
      name.textContent = entry.name;

      const date = document.createElement('div');
      date.className = 'history-date';
      date.textContent = entry.date;

      info.appendChild(name);
      info.appendChild(date);
      item.appendChild(info);

      const del = document.createElement('button');
      del.className = 'history-del';
      del.textContent = '✕';
      del.onclick = (e) => deleteHistory(entry.id, e);
      item.appendChild(del);

      list.appendChild(item);
    });
  });
}

// ══════════════════════════════════════════
//  EXPORT / IMPORT
// ══════════════════════════════════════════
function exportHistory() {
  if (!history.length) return toast('저장된 히스토리가 없습니다', 'error');
  const blob = new Blob([JSON.stringify(history, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ronai-seo-history-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('히스토리를 내보냈습니다', 'success');
}

function importHistory(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) throw new Error();

      const existingIds = new Set(history.map(h => h.id));
      const newEntries = imported.filter(h => !existingIds.has(h.id));
      history = [...newEntries, ...history].slice(0, 50);
      localStorage.setItem('ronai_seo_history', JSON.stringify(history));
      renderHistory();
      toast(`${newEntries.length}개의 히스토리를 가져왔습니다`, 'success');
    } catch {
      toast('파일 형식이 올바르지 않습니다', 'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ══════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════
function copyToClipboard(text) {
  if (!text) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => toast('복사됨 ✓', 'success'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('복사됨 ✓', 'success');
  }
}

let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2200);
}
</script>
